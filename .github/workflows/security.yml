name: Security Review

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  security-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install anthropic

      - name: Claude Security Analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -c "
          import os
          from anthropic import Anthropic

          client = Anthropic(api_key=os.environ['ANTHROPIC_API_KEY'])
          
          # Leemos el archivo con la vulnerabilidad de lotería
          with open('test_security_vulnerabilities.py', 'r') as f:
              code = f.read()

          prompt = f'Revisa este código de un generador de lotería en busca de inyecciones SQL en engram.db y fugas de datos:\n\n{code}'
          
          message = client.messages.create(
              model='claude-3-5-sonnet-latest',
              max_tokens=1024,
              messages=[{'role': 'user', 'content': prompt}]
          )
          print('\n--- REPORTE DE SEGURIDAD DE CLAUDE ---')
          print(message.content[0].text)
          print('--- FIN DEL REPORTE ---')
          "
