name: Security Review

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  security-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Claude Code Security Review
        uses: anthropics/claude-code-security-review@v1
        with:
          review-focus: |
            Focus on:
            1. SQL Injection in engram.db (check for f-strings in queries).
            2. Hardcoded secrets or API keys.
            3. Data integrity in lottery era normalization.
          fail-on: high
          comment-details: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
